<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Web App</title>
    <style>
      :root {
        font-family: Inter, system-ui, sans-serif;
        color-scheme: dark;
        background: #0f172a;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background: linear-gradient(180deg, #0f172a 0%, #020617 100%);
      }

      .container {
        width: min(100%, 640px);
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
        padding: 2rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 4vw, 2.5rem);
        letter-spacing: -0.04em;
      }

      .subtitle {
        margin: 0 0 1.75rem;
        color: #94a3b8;
        line-height: 1.6;
      }

      .input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }

      input {
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 16px;
        padding: 1rem 1rem;
        font-size: 1rem;
        background: rgba(15, 23, 42, 0.85);
        color: #e2e8f0;
        outline: none;
      }

      button {
        border: none;
        border-radius: 16px;
        padding: 1rem 1.25rem;
        font-size: 1rem;
        background: #38bdf8;
        color: #020617;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        background: #22d3ee;
      }

      .todo-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.75rem;
      }

      .todo-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 0.75rem;
        align-items: center;
        padding: 1rem 1rem;
        border-radius: 18px;
        border: 1px solid rgba(148, 163, 184, 0.12);
        background: rgba(15, 23, 42, 0.7);
      }

      .todo-item.done {
        opacity: 0.7;
      }

      .todo-item label {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        cursor: pointer;
      }

      .todo-item input[type='checkbox'] {
        width: 1.1rem;
        height: 1.1rem;
        accent-color: #38bdf8;
      }

      .todo-item span {
        word-break: break-word;
      }

      .todo-item.done span {
        text-decoration: line-through;
        color: #94a3b8;
      }

      .todo-item button {
        background: transparent;
        color: #fda4af;
        font-weight: 700;
      }

      .todo-item button:hover {
        background: rgba(248, 113, 113, 0.14);
      }

      .footer {
        margin-top: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #94a3b8;
        font-size: 0.95rem;
      }

      @media (max-width: 560px) {
        .container {
          padding: 1.5rem;
        }

        .input-row {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Todo Web</h1>
      <p class="subtitle">Add tasks, check them off, and keep your day on track. Your list is saved locally in the browser.</p>

      <div class="input-row">
        <input id="taskInput" type="text" placeholder="Add a new task" autocomplete="off" />
        <button id="addTaskButton">Add</button>
      </div>

      <ul id="todoList" class="todo-list"></ul>

      <div class="footer">
        <span id="taskCount">0 tasks</span>
        <button id="clearCompletedButton">Clear completed</button>
      </div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
